<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTech</title>
</head>
<body>
    <table border="2" width="50%" height="200" align="center" cellpadding="20" >
         <thead>
            <tr>
               <th>PID</th>
               <th>Name</th>
               <th>Qty</th>
               <th>Price</th>
            </tr>
         </thead>

         <tbody align="center">
           <tr>
                <td>1</td>
                <td>Laptop</td>
                <td>5</td>
                <td>50000</td>
           </tr>

           <tr>
                <td>2</td>
                <td>Mouse</td>
                <td rowspan="2">10</td>
                <td rowspan="2">500</td>
           </tr>

           <tr>
                <td>3</td>
                <td>Keyboard</td>
           </tr>

           <tr>
                <td>Total</td>
                <td colspan="3">66500</td>
           </tr>
         </tbody>
    </table>
</body>
</html>
